{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}
{% block unauthenticated_content %}
<div class="auth-container">
    <div class="auth-card" style="text-align:center;">
        <div class="auth-card-body" style="padding:3rem 2rem;">
            <div style="font-size:4rem;margin-bottom:1rem;">🚫</div>
            <h1 style="font-size:1.5rem;margin-bottom:0.5rem;">Access Denied</h1>
            <p class="text-muted" style="margin-bottom:1.5rem;">You don't have permission to access this page.</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary">← Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_css %}
<style>
    .sidebar { display: none !important; }
    .main-content { margin-left: 0 !important; }
</style>
{% endblock %}
